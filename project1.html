<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project1</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
        h2{
            color:blue;
            text-align: left;
        }
        p{
            font-size:18px;
        }
        .info{
            color:aqua;
            font-weight: bold;
        }
        #primary{
            color:blueviolet;
            font-weight: bold;
        }
        
    </style>
</head>
<body>
    <h1 style="color:red; text-align:left;">Inline CSS</h1>
    <h2>Internal CSS</h2>
    <p>
        This paragraph is styled using Internal CSS.
    </p>
    <p class="info">This paragraph uses both CSS types and selectors</p>
    <p id="primary">ID selector</p>
    <h2 class="secondary">External CSS</h2>
    
</body>
</html>
